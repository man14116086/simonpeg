<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Data Pegawai</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

  <style>
    body{
        margin:0;
        font-family:'Segoe UI',sans-serif;
        background:radial-gradient(circle at 20% 20%, #2c3e73, #141e30);
        color:white;
    }

    .wrapper{display:flex;min-height:100vh;}

    .sidebar{
        width:250px;
        padding:30px 20px;
        background:rgba(0,0,0,0.35);
        backdrop-filter:blur(20px);
    }

    .sidebar h2{margin-bottom:40px;}

    .sidebar a, .sidebar button{
        display:block;
        padding:12px;
        margin-bottom:10px;
        border-radius:12px;
        text-decoration:none;
        color:white;
        background: transparent;
        border:none;
    }

    .sidebar a:hover, .sidebar button:hover{
        background:rgba(255,255,255,0.2);
    }

    .main{flex:1;padding:30px;}

    .table-box{
        margin-top:30px;
        padding:20px;
        border-radius:20px;
        background:rgba(255,255,255,0.08);
        backdrop-filter:blur(20px);
    }

    input{
        padding:10px 20px;
        border-radius:25px;
        border:none;
        width:250px;
    }

    table{
        width:100%;
        margin-top:20px;
        border-collapse:collapse;
    }

    th,td{
        padding:12px;
        border-bottom:1px solid rgba(255,255,255,0.2);
    }

    tr:hover{
        background:rgba(255,255,255,0.1);
    }

    @media(max-width:1000px){
        .sidebar{display:none;}
    }
</style>
</head>

<body>
<div class="wrapper">

  <div class="sidebar">
    <h2>Sistem Kepegawaian</h2>
    <div class="menu">
      <a th:href="@{/home}">
        <i class="fas fa-home"></i>
        <span>Dashboard</span>
      </a>
      <a th:href="@{/pegawai}">
        <i class="fas fa-users"></i>
        <span>Pegawai</span>
      </a>
      <form th:action="@{/logout}" method="post">
        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}" />
        <button type="submit">
            <i class="fas fa-power-off"></i>
            <span>Logout</span>
        </button>
      </form>
    </div>
  </div>

  <div class="main">
    <h1>Data Pegawai</h1>

    <a class="" th:href="@{/pegawai/upsert}">Tambah Data Pegawai</a>

    <div class="table-box">
      <input placeholder="Search...">
      <table>
        <tr>
          <th>NIP</th>
          <th>Nama</th>
          <th>Jabatan</th>
          <th>Unit Kerja</th>
          <th>Aksi</th>
        </tr>
        <tr>
          <td>198765</td>
          <td>Budi Santoso</td>
          <td>Pengadministrasi Umum</td>
          <td>TU</td>
            <td>
                <div class="">
                    <a th:href="@{/pegawai/upsert(nip=*{nip})}" style="text-decoration:none;">Edit</a>
                    <a class="fas fa-trash-alt" th:href="@{/pegawai/delete(nip=*{nip})}" style="text-decoration:none;">Hapus</a>
                </div>
            </td>
        </tr>
      </table>
    </div>
  </div>

</div>
</body>
</html>
