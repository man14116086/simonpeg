<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Sistem Kepegawaian</title>

    <!-- Bootstrap, Icons, Font -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/resources/css/style.css}">
</head>
<body class="auth-page">
<!-- Login center container -->
<main class="auth-wrapper">
    <section class="auth-card">
        <div class="text-center mb-4">
            <div class="logo-circle mx-auto mb-3"><i class="bi bi-shield-lock-fill"></i></div>
            <h1 class="h4 fw-bold mb-1">Kanwil Ditjen Pemasyarakatan</h1>
            <p class="text-muted mb-0">Silakan login untuk melanjutkan</p>
        </div>

        <!-- Alert error from Spring Security -->
        <div class="alert alert-danger" th:if="${param.error}">
            Username atau password salah.
        </div>

        <!-- Alert logout from Spring Security -->
        <div class="alert alert-success" th:if="${param.logout}">
            Anda berhasil logout.
        </div>

        <!-- Login form -->
        <form th:attr="action=@{/loginProcess}" method="post" class="d-grid gap-3">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="field-validation-error" th:if="${param.errors != null}" th:text="${param.errors}"></div>
            <div>
                <label for="username" class="form-label">Username</label>
                <input id="username" name="username" type="text" class="form-control" placeholder="Masukkan username" required>
            </div>
            <div>
                <label for="password" class="form-label">Password</label>
                <input id="password" name="password" type="password" class="form-control" placeholder="Masukkan password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-auth">Login</button>
        </form>

        <p class="text-center mt-3 mb-0">
            Belum punya akun?
            <a th:href="@{/account/register}" class="fw-semibold text-decoration-none">Daftar di sini</a>
        </p>
    </section>
</main>
</body>
</html>
