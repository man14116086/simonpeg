<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Sistem Kepegawaian</title>

    <!-- Bootstrap, Icons, Font -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/resources/css/style.css}">
</head>
<body class="auth-page">
<!-- Register center container -->
<main class="auth-wrapper">
    <section class="auth-card auth-card-lg">
        <div class="text-center mb-4">
            <h1 class="h4 fw-bold mb-1">Registrasi Akun</h1>
            <p class="text-muted mb-0">Buat akun untuk mengakses sistem</p>
        </div>

        <!-- Registration form with object binding -->
        <form th:attr="action=@{/account/register}" th:object="${dto}" method="post" class="row g-3">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <!--<div class="col-12">
                <label for="fullName" class="form-label">Nama Lengkap</label>
                <input id="fullName" type="text" class="form-control" th:field="*{fullName}" placeholder="Nama lengkap" required>
                <small class="text-danger" th:errors="*{fullName}"></small>
            </div>-->

            <div class="col-md-6">
                <label for="username" class="form-label">Username</label>
                <input id="username" type="text" class="form-control" th:field="*{username}" placeholder="Username" required>
                <small class="text-danger" th:errors="*{username}"></small>
            </div>

            <!--<div class="col-md-6">
                <label for="email" class="form-label">Email</label>
                <input id="email" type="email" class="form-control" th:field="*{email}" placeholder="email@instansi.go.id" required>
                <small class="text-danger" th:errors="*{email}"></small>
            </div>-->

            <div class="col-md-6">
                <label for="password" class="form-label">Password</label>
                <input id="password" type="password" class="form-control" th:field="*{password}" placeholder="Password" required>
                <small class="text-danger" th:errors="*{password}"></small>
            </div>

            <div class="col-md-6">
                <label for="confirmPassword" class="form-label">Confirm Password</label>
                <input id="confirmPassword" type="password" class="form-control" th:field="*{passwordConfirm}" placeholder="Konfirmasi password" required>
                <small class="text-danger" th:errors="*{passwordConfirm}"></small>
            </div>

            <div class="col-12 d-grid mt-2">
                <button type="submit" class="btn btn-primary btn-auth">Daftar</button>
            </div>
        </form>

        <p class="text-center mt-3 mb-0">
            Sudah punya akun?
            <a th:href="@{/account/loginForm}" class="fw-semibold text-decoration-none">Kembali ke login</a>
        </p>
    </section>
</main>
</body>
</html>
