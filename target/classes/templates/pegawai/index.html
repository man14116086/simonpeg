<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Data Pegawai</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

  <style>
    body{
        margin:0;
        font-family:'Segoe UI',sans-serif;
        background:radial-gradient(circle at 20% 20%, #2c3e73, #141e30);
        color:white;
    }

    .wrapper{display:flex;min-height:100vh;}

    .sidebar{
        width:250px;
        padding:30px 20px;
        background:rgba(0,0,0,0.35);
        backdrop-filter:blur(20px);
    }

    .sidebar h2{margin-bottom:40px;}

    .sidebar a, .sidebar button{
        display:block;
        padding:12px;
        margin-bottom:10px;
        border-radius:12px;
        text-decoration:none;
        color:white;
        background: transparent;
        border:none;
    }

    .sidebar a:hover, .sidebar button:hover{
        background:rgba(255,255,255,0.2);
    }

    .main{flex:1;padding:30px;}

    .table-box{
        margin-top:30px;
        padding:20px;
        border-radius:20px;
        background:rgba(255,255,255,0.08);
        backdrop-filter:blur(20px);
    }

    input{
        padding:10px 20px;
        border-radius:25px;
        border:none;
        width:250px;
    }

    table{
        width:100%;
        margin-top:20px;
        border-collapse:collapse;
    }

    th,td{
        padding:12px;
        border-bottom:1px solid rgba(255,255,255,0.2);
    }

    tr:hover{
        background:rgba(255,255,255,0.1);
    }

    .aksi{
    display: flex;
    gap: 10px;      /* jarak antar icon */
    align-items: center;
    }

    .pagination {
    display: flex;
    justify-content: space-between;
    }
    .pagination a {
        color: #14acf8;
        border: solid 1px #14acf8;
        display: inline-block;
        cursor: pointer;
        width: 40px;
        height: 24px;
        line-height: 24px;
        text-align: center;
        border-radius: 4px;
        text-decoration:none;
        margin-right:3px;
    }
    .pagination a:last-child{
        margin-right:0;
    }

    @media(max-width:1000px){
        .sidebar{display:none;}
    }
</style>
</head>

<body>
<div class="wrapper">

  <div class="sidebar">
    <h2>Sistem Kepegawaian</h2>
    <div class="menu">
      <a th:href="@{/home}">
        <i class="fas fa-home"></i>
        <span>Dashboard</span>
      </a>
      <a th:href="@{/pegawai}">
        <i class="fas fa-users"></i>
        <span>Pegawai</span>
      </a>
      <form th:action="@{/logout}" method="post">
        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}" />
        <button type="submit">
            <i class="fas fa-power-off"></i>
            <span>Logout</span>
        </button>
      </form>
    </div>
  </div>

  <div class="main">
    <h1>Data Pegawai</h1>

    <a class="btn-add" th:href="@{/pegawai/upsert}">Tambah Data Pegawai</a>

    <div class="table-box">
      <input placeholder="Search...">
      <table>
        <thead>
        <tr>
          <th>NIP</th>
          <th>Nama</th>
          <th>Jabatan</th>
          <th>Unit Kerja</th>
          <th>Aksi</th>
        </tr>
        </thead>
        <tbody>
          <tr th:each="pegawai : ${listPegawai}" th:object="${pegawai}">
            <td th:text="*{nip}"></td>
            <td th:text="*{nama}"></td>
            <td th:text="*{namaJabatan}"></td>
            <td th:text="*{namaUnitKerja}"></td>
            <td>
              <div class="aksi">
                <a class="fas fa-pen-to-square" th:href="@{/pegawai/upsert(nip=*{nip})}" style="text-decoration:none;color:white;" title="Edit"></a>
                <a class="fas fa-trash" th:href="@{/pegawai/delete(nip=*{nip})}" style="text-decoration:none;color:white;" title="Hapus"></a>
                <a class="fas fa-eye" th:href="@{/pegawai/detail(nip=*{nip})}" style="text-decoration:none;color:white;" title="Detail"></a>
              </div>
            </td>
          </tr>
        </tbody>
        <tfoot>
        <td colspan="5">
          <div class="pagination">
            <div th:attr="data-currentPage=${currentPage}" th:text="|page ${currentPage} of ${totalPage}|"></div>
            <div th:if="${totalPage > 0}">
              <a th:style="${currentPage == totalPage} ? 'pointer-events:none;'" th:href="@{/pegawai/index(page=${(currentPage - 1)}, nip=${nip}, nama=${nama}, namaJabatan=${namaJabatan})}" class="fa fa-arrow-left"> </a>
              <a th:each="loop:${#numbers.sequence(1, totalPage)}"
                 th:href="@{/pegawai/index(page=${loop}, nip=${nip}, nama=${nama}, namaJabatan=${namaJabatan})}"
                 th:text="${loop}"></a>
              <a th:style="${currentPage == totalPage} ? 'pointer-events:none;'" th:href="@{/pegawai/index(page=${(currentPage + 1)}, nip=${nip}, nama=${nama}, namaJabatan=${namaJabatan})}" class="fa fa-arrow-right"></a>
            </div>
          </div>
        </td>
        </tfoot>
      </table>
    </div>
  </div>

</div>
</body>
</html>
