<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Pegawai</title>

  <style>
    :root{
    --bg: linear-gradient(135deg,#1f2a44,#3a4f7a);
    --glass: rgba(255,255,255,0.08);
    --text:#fff;
    }
    body.light{
    --bg:#f4f6f9;
    --glass:#fff;
    --text:#222;
    }

    *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

    body{
    min-height:100vh;
    background:var(--bg);
    display:flex;
    padding:20px;
    color:var(--text);
    transition:.4s;
    }

    .wrapper{
    width:100%;
    display:flex;
    border-radius:25px;
    overflow:hidden;
    background:var(--glass);
    backdrop-filter:blur(20px);
    animation:fadeIn .6s ease;
    }

    @keyframes fadeIn{
    from{opacity:0;transform:translateY(10px);}
    to{opacity:1;transform:translateY(0);}
    }

    .sidebar{
    width:250px;
    background:rgba(0,0,0,0.3);
    padding:25px;
    }
    .sidebar a{
    display:block;
    padding:12px;
    margin-bottom:10px;
    border-radius:10px;
    color:white;
    text-decoration:none;
    transition:.3s;
    }
    .sidebar a:hover{background:rgba(255,255,255,0.2);}

    .main{flex:1;padding:30px;}

    table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
    }
    th,td{
    padding:12px;
    border-bottom:1px solid rgba(255,255,255,0.2);
    }

    @media(max-width:1024px){
    .sidebar{display:none;}
    }
</style>
</head>
<body>

<div class="wrapper">

  <div class="sidebar">
    <h2>Sistem Kepegawaian</h2>
    <a th:href="@{/home}">Dashboard</a>
    <a th:href="@{/pegawai}">Pegawai</a>
    <a href="#">Logout</a>
  </div>

  <div class="main">
    <h1>Data Pegawai</h1>

    <table>
      <tr>
        <th>NIP</th>
        <th>Nama</th>
        <th>Unit Kerja</th>
      </tr>
      <tr>
        <td>198765</td>
        <td>Budi Santoso</td>
        <td>TU</td>
      </tr>
    </table>

  </div>
</div>

<script>
if(localStorage.getItem("theme")==="light"){
document.body.classList.add("light");
}
</script>

</body>
</html>
