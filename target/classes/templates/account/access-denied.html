<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 - Access Denied</title>

    <!-- Bootstrap, Icons, Font -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-page">
<!-- Access denied container -->
<main class="auth-wrapper">
    <section class="auth-card text-center">
        <i class="bi bi-shield-exclamation denied-icon"></i>
        <h1 class="fw-bold mt-3">403 - Access Denied</h1>
        <p class="text-muted mb-4">Anda tidak memiliki hak akses ke halaman ini.</p>
        <a th:href="@{/dashboard}" class="btn btn-primary btn-auth px-4">Kembali ke Dashboard</a>
    </section>
</main>
</body>
</html>
